name: Feature request
description: Suggest a new feature or improvement for rcsb-api
title: "[FEATURE]: "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature for **rcsb-api**.

        Please provide as much detail as possible so we can evaluate the request.

  - type: textarea
    id: problem_description
    attributes:
      label: Problem description
      description: |
        Is your feature request related to a problem or limitation?
        Describe the problem clearly.
      placeholder: |
        I'm trying to do X but the API currently only supports Y.
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed solution
      description: |
        Describe the feature or improvement you would like to see.
      placeholder: |
        It would be helpful if rcsb-api supported...
    validations:
      required: true

  - type: textarea
    id: proposed_api
    attributes:
      label: Suggested API design (optional)
      description: |
        If applicable, describe how the feature might look in Python code.
      render: python
      placeholder: |
        from rcsbapi.search import NewFeature

        result = NewFeature(...)

  - type: dropdown
    id: api_component
    attributes:
      label: API component
      description: Which part of rcsb-api would this affect?
      options:
        - Search API
        - Data API
        - Model API
        - Sequence Coordinates API
        - Documentation
        - Installation / Packaging
        - Performance
        - Other
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: |
        Describe the real-world use case for this feature.
      placeholder: |
        This feature would help when performing large-scale structure searches
        for datasets involving...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        Have you considered alternative approaches or workarounds?
      placeholder: |
        Currently I work around this by...

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: |
        Add any other context, links, examples, or screenshots that might help.